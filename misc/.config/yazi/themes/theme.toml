[app]
overall = { bg = "reset" }

[mgr]
cwd = { fg = "#83c092" }

find_keyword  = { fg = "#dbbc7f", italic = true }
find_position = { fg = "#d699b6", bg = "reset", italic = true }

marker_copied   = { fg = "#a7c080", bg = "#a7c080" }
marker_cut      = { fg = "#e67e80", bg = "#e67e80" }
marker_marked   = { fg = "#83c092", bg = "#83c092" }
marker_selected = { fg = "#7fbbb3", bg = "#7fbbb3" }

count_copied   = { fg = "#2d353b", bg = "#a7c080" }
count_cut      = { fg = "#2d353b", bg = "#e67e80" }
count_selected = { fg = "#2d353b", bg = "#7fbbb3" }

border_symbol = "│"
border_style  = { fg = "#d3c6aa" }

syntect_theme = "~/.config/yazi/theme.tmTheme"

[tabs]
active   = { fg = "#2d353b", bg = "#d3c6aa", bold = true }
inactive = { fg = "#d3c6aa", bg = "#475258" }

[mode]
normal_main = { fg = "#2d353b", bg = "#7fbbb3", bold = true }
normal_alt  = { fg = "#7fbbb3", bg = "#475258" }

select_main = { fg = "#2d353b", bg = "#a7c080", bold = true }
select_alt  = { fg = "#a7c080", bg = "#475258" }

unset_main  = { fg = "#2d353b", bg = "#e67e80", bold = true }
unset_alt   = { fg = "#e67e80", bg = "#475258" }

[indicator]
parent  = { fg = "#2d353b", bg = "#d3c6aa" }
current = { fg = "#2d353b", bg = "#7fbbb3" }
preview = { fg = "#2d353b", bg = "#d3c6aa" }

[status]
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label  = { fg = "#d3c6aa", bold = true }
progress_normal = { fg = "#a7c080", bg = "#475258" }
progress_error  = { fg = "#dbbc7f", bg = "#e67e80" }

mode_normal = { fg = "#2d353b", bg = "#7fbbb3", bold = true }
mode_select = { fg = "#2d353b", bg = "#a7c080", bold = true }
mode_unset  = { fg = "#2d353b", bg = "#e67e80", bold = true }

permissions_t = { fg = "#7fbbb3" }
permissions_r = { fg = "#e67e80" }
permissions_w = { fg = "#dbbc7f" }
permissions_x = { fg = "#a7c080" }
permissions_s = { fg = "#d699b6" }

[file]
fg       = "#d3c6aa"

orphan   = { fg = "#e67e80" }
link     = { fg = "#d699b6" }
external = { fg = "#d699b6" }
