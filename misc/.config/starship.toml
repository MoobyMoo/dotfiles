add_newline = true
command_timeout = 200
format = "[$directory$git_branch$git_status]($style)$character"

[character]
error_symbol = "[✗](bold #bf616a)"
success_symbol = "[❯](bold #81a1c1)"

[directory]
truncation_length = 0
truncation_symbol = ""
format = "[$path]($style) "

[git_branch]
format = "[$branch]($style) "
style = "italic #b48ead"

[git_status]
format     = '[$all_status]($style)'
style      = "#88c0d0"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""
