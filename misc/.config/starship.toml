add_newline = true
command_timeout = 200
format = "[$directory$git_branch$git_status]($style)$character"

[character]
error_symbol = "[✗](bold #a4a4a4)"
success_symbol = "[❯](bold #8d8d8d)"

[directory]
truncation_length = 0
truncation_symbol = ""
repo_root_style = "bold #8d8d8d"
repo_root_format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic #9b9b9b"

[git_status]
format     = '[$all_status]($style)'
style      = "#b0b0b0"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""
