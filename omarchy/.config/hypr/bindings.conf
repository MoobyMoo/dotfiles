# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, uwsm-app -- brave
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- xdg-terminal-exec yazi
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" yazi
bindd = SUPER SHIFT, B, Browser, exec, uwsm-app -- brave
bindd = SUPER SHIFT ALT, B, Browser (private), exec, uwsm-app -- brave --incognito
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# --- HJKL Navigation Overrides ---

# 1. Unbind ALL HJKL combinations to ensure clean slate
unbind = SUPER, H
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L
unbind = SUPER SHIFT, H
unbind = SUPER SHIFT, J
unbind = SUPER SHIFT, K
unbind = SUPER SHIFT, L
unbind = SUPER ALT, H
unbind = SUPER ALT, J
unbind = SUPER ALT, K
unbind = SUPER ALT, L
unbind = SUPER CTRL, H
unbind = SUPER CTRL, L
unbind = SUPER SHIFT ALT, H
unbind = SUPER SHIFT ALT, J
unbind = SUPER SHIFT ALT, K
unbind = SUPER SHIFT ALT, L

# 2. Map SUPER + HJKL to Focus (Movement)
bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, L, Move window focus right, movefocus, r
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, J, Move window focus down, movefocus, d

# 3. Map SUPER + SHIFT + HJKL to Swap Windows (Movement)
bindd = SUPER SHIFT, H, Swap window left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window right, swapwindow, r
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d

# 4. Map SUPER + ALT + HJKL to Move to Group (Movement)
bindd = SUPER ALT, H, Move to group left, moveintogroup, l
bindd = SUPER ALT, L, Move to group right, moveintogroup, r
bindd = SUPER ALT, K, Move to group up, moveintogroup, u
bindd = SUPER ALT, J, Move to group down, moveintogroup, d

# 5. Map SUPER + SHIFT + ALT + HJKL to Move Workspace to Monitor (Movement)
bindd = SUPER SHIFT ALT, H, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, L, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, K, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, J, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# 6. Map SUPER + CTRL + H/L to Cycle Grouped Windows (Movement)
bindd = SUPER CTRL, H, Prev window in group, changegroupactive, b
bindd = SUPER CTRL, L, Next window in group, changegroupactive, f

# --- Arrow Key Remapping (Non-Movement) ---

# 7. Unbind existing Arrow key functions
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN

# 8. Map original HJKL functions to Arrow Keys
# Super + Down = Toggle Split (was Super + J)
bindd = SUPER, DOWN, Toggle window split, layoutmsg, togglesplit
# Super + Right = Toggle Layout / Scrolling (was Super + L / Super + Mouse Scroll)
bindd = SUPER, RIGHT, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle
# Super + Up = Show Key Bindings (was Super + Shift + K)
bindd = SUPER, UP, Show key bindings, exec, omarchy-menu-keybindings
# Super + Left = Lock System (was Super + Alt + L)
bindd = SUPER, LEFT, Lock system, exec, omarchy-lock-screen

# Super + Shift + Right = Cycle monitor scaling (Bonus mapping since Super+L had multiple contexts)
bindd = SUPER SHIFT, RIGHT, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle
