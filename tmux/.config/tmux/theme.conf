# Auto-generated tmux theme configuration
# Based on current omarchy theme: gruvbox

# Color palette
set -g @accent "#7daea3"
set -g @foreground "#d4be98"
set -g @background "#282828"

# Status bar
set -g status-style "bg=default,fg=#d4be98"
set -g status-left "#[fg=#282828,bg=#7daea3,bold] #S #[bg=default,fg=#d4be98] "
set -g status-right "#[fg=#7daea3]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=#7daea3,bold] #I:#W "

# Borders and indicators
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=#7daea3"
set -g message-style "bg=default,fg=#7daea3"
set -g message-command-style "bg=default,fg=#7daea3"
set -g mode-style "bg=#7daea3,fg=#282828"
setw -g clock-mode-colour "#7daea3"
